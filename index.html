<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GroupDIed #5499 | Midnight Vision</title>
    <style>
        /* إعدادات الألوان والثيم الأزرق */
        :root {
            --primary: #00d2ff; /* أزرق سماوي نيون */
            --accent: #0045ff;  /* أزرق غامق */
            --bg-overlay: rgba(2, 5, 20, 0.85);
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #e0e6ff;
        }

        body {
            margin: 0;
            padding: 0;
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            background: url('https://i.imgur.com/w19kdjf.png') no-repeat center center fixed;
            background-size: cover;
            overflow-x: hidden;
        }

        /* طبقة التغبيش فوق الخلفية */
        .overlay {
            background: var(--bg-overlay);
            min-height: 100vh;
            backdrop-filter: blur(8px);
            padding-bottom: 50px;
        }

        header {
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        header h1 {
            font-size: 4.5rem;
            color: #fff;
            margin: 0;
            text-shadow: 0 0 30px var(--primary);
            letter-spacing: 2px;
        }

        header p {
            font-size: 1.4rem;
            color: var(--primary);
            font-weight: 300;
            margin-top: 10px;
        }

        /* زر الانضمام النبضي */
        .join-btn {
            margin-top: 30px;
            padding: 15px 40px;
            background: linear-gradient(45deg, var(--accent), var(--primary));
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
            transition: 0.3s;
            animation: pulse 2s infinite;
        }

        .join-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px var(--primary);
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 210, 255, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(0, 210, 255, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 210, 255, 0); }
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .section-title {
            text-align: center;
            font-size: 2.8rem;
            margin: 60px 0;
            color: #fff;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        /* ستايل كروت المؤسسين الزجاجي */
        .founders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
        }

        .founder-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 35px 20px;
            text-align: center;
            transition: 0.4s;
            text-decoration: none;
            color: inherit;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        .founder-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0,210,255,0.1) 0%, transparent 70%);
            transition: 0.5s;
        }

        .founder-card:hover {
            transform: translateY(-15px);
            border-color: var(--primary);
            background: rgba(0, 210, 255, 0.05);
        }

        .founder-card img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid var(--primary);
            box-shadow: 0 0 15px var(--primary);
            margin-bottom: 20px;
            position: relative;
        }

        .founder-card h3 {
            margin: 15px 0 5px;
            font-size: 1.6rem;
            color: #fff;
            position: relative;
        }

        .founder-card .role {
            font-size: 0.85rem;
            color: var(--primary);
            letter-spacing: 2px;
            position: relative;
        }

        footer {
            text-align: center;
            padding: 60px 0;
            color: rgba(255,255,255,0.4);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="overlay">
        <header>
            <h1>GroupDIed #5499</h1>
            <p>أساطير الظلال في عالم الديسكورد</p>
            <a href="https://discord.gg/BW9vTfTV" class="join-btn">انضم إلى السيرفر</a>
        </header>

        <div class="container">
            <h2 class="section-title">طاقم الإدارة والمؤسسين</h2>
            
            <div class="founders-grid">
                
                <a href="https://discord.com/users/919483065087168533" target="_blank" class="founder-card">
                    <img src="https://i.imgur.com/w19kdjf.png" alt="Owner">
                    <h3>Owner</h3>
                    <p class="role">المالك الأساسي</p>
                </a>

                <a href="https://discord.com/users/1179893397016817855" target="_blank" class="founder-card">
                    <img src="https://i.imgur.com/w19kdjf.png" alt="Founder">
                    <h3>Founder</h3>
                    <p class="role">مؤسس السيرفر</p>
                </a>

                <a href="https://discord.com/users/1445170812352204941" target="_blank" class="founder-card">
                    <img src="https://i.imgur.com/w19kdjf.png" alt="Founder">
                    <h3>Founder</h3>
                    <p class="role">مؤسس السيرفر</p>
                </a>

                <a href="https://discord.com/users/1322272211910000690" target="_blank" class="founder-card">
                    <img src="https://i.imgur.com/w19kdjf.png" alt="Founder">
                    <h3>Founder</h3>
                    <p class="role">مؤسس السيرفر</p>
                </a>

            </div>
        </div>

        <footer>
            <p>© 2026 GroupDIed #5499. تمت البرمجة بواسطة Void.</p>
        </footer>
    </div>

</body>
</html>
